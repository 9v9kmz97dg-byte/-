<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Туған күнге шақыру 💓</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<style>
  :root {
    --pink-100: #fff0f5;
    --pink-200: #ffd6e7;
    --pink-300: #ffb3d1;
    --pink-400: #ff80b5;
    --pink-500: #ff4d94;
    --pink-600: #e6297a;
    --pink-700: #c2185b;
    --gold: #d4a853;
    --gold-light: #f0d68a;
    --text-dark: #5c1a3a;
    --text-light: #fff0f5;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Nunito', sans-serif;
    min-height: 100vh;
    background: linear-gradient(160deg, #ffe0ed 0%, #ffb3d1 25%, #ffa0c8 50%, #ff8cbe 75%, #ffd6e7 100%);
    background-attachment: fixed;
    overflow-x: hidden;
    color: var(--text-dark);
    position: relative;
  }

  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background:
      radial-gradient(ellipse at 20% 20%, rgba(255,255,255,0.3) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(255,182,217,0.4) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 50%, rgba(255,255,255,0.1) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .petals-container {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
    z-index: 1;
    overflow: hidden;
  }

  .petal {
    position: absolute;
    width: 18px;
    height: 18px;
    background: radial-gradient(ellipse at 30% 30%, #ffcce0, #ff99bf);
    border-radius: 50% 0 50% 0;
    opacity: 0;
    animation: petalFall linear infinite;
    box-shadow: 0 0 6px rgba(255,150,190,0.3);
  }

  @keyframes petalFall {
    0% { opacity: 0; transform: translateY(-20px) rotate(0deg) scale(0.8); }
    10% { opacity: 0.7; }
    90% { opacity: 0.5; }
    100% { opacity: 0; transform: translateY(100vh) rotate(360deg) scale(0.4); }
  }

  .container {
    position: relative;
    z-index: 2;
    max-width: 520px;
    margin: 0 auto;
    padding: 24px 16px 40px;
  }

  /* Hero Section */
  .hero {
    text-align: center;
    padding: 40px 20px 30px;
    animation: fadeSlideUp 1s ease-out;
  }

  @keyframes fadeSlideUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .flower-ornament {
    font-size: 40px;
    margin-bottom: 10px;
    animation: gentlePulse 3s ease-in-out infinite;
  }

  @keyframes gentlePulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.08); }
  }

  .hero h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2.6rem;
    font-weight: 700;
    color: var(--pink-700);
    line-height: 1.2;
    margin-bottom: 8px;
    text-shadow: 0 2px 8px rgba(194,24,91,0.15);
  }

  .hero .heart-icon {
    font-size: 2rem;
    color: var(--pink-500);
    display: inline-block;
    animation: heartbeat 1.4s ease-in-out infinite;
  }

  @keyframes heartbeat {
    0%, 100% { transform: scale(1); }
    14% { transform: scale(1.2); }
    28% { transform: scale(1); }
    42% { transform: scale(1.15); }
    56% { transform: scale(1); }
  }

  .invitation-text {
    font-size: 1.15rem;
    color: var(--text-dark);
    line-height: 1.7;
    margin-top: 16px;
    padding: 0 10px;
    font-weight: 600;
  }

  /* Card */
  .card {
    background: rgba(255,255,255,0.65);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border-radius: 24px;
    padding: 28px 24px;
    margin: 24px 0;
    border: 1.5px solid rgba(255,255,255,0.7);
    box-shadow:
      0 8px 32px rgba(194,24,91,0.1),
      0 2px 8px rgba(255,150,190,0.2),
      inset 0 1px 0 rgba(255,255,255,0.8);
    animation: fadeSlideUp 1s ease-out;
    animation-fill-mode: backwards;
  }

  .card:nth-child(2) { animation-delay: 0.2s; }
  .card:nth-child(3) { animation-delay: 0.4s; }
  .card:nth-child(4) { animation-delay: 0.6s; }

  .card-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.4rem;
    font-weight: 700;
    color: var(--pink-700);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .card-title i {
    color: var(--gold);
    font-size: 1.2rem;
  }

  /* Calendar */
  .calendar {
    background: linear-gradient(135deg, #fff5f9, #ffe8f0);
    border-radius: 18px;
    overflow: hidden;
    border: 1px solid rgba(255,179,209,0.4);
    box-shadow: 0 4px 16px rgba(194,24,91,0.08);
  }

  .calendar-header {
    background: linear-gradient(135deg, var(--pink-600), var(--pink-700));
    color: white;
    text-align: center;
    padding: 14px;
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.3rem;
    font-weight: 700;
    letter-spacing: 1px;
  }

  .calendar-weekdays {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    padding: 10px 8px 4px;
    gap: 2px;
  }

  .calendar-weekdays span {
    text-align: center;
    font-size: 0.7rem;
    font-weight: 700;
    color: var(--pink-600);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .calendar-days {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    padding: 4px 8px 12px;
    gap: 2px;
  }

  .calendar-day {
    text-align: center;
    padding: 7px 2px;
    font-size: 0.85rem;
    border-radius: 10px;
    color: var(--text-dark);
    font-weight: 600;
    transition: all 0.3s;
  }

  .calendar-day.empty { visibility: hidden; }

  .calendar-day.today {
    background: linear-gradient(135deg, var(--pink-500), var(--pink-700));
    color: white;
    font-weight: 700;
    font-size: 1rem;
    box-shadow: 0 3px 12px rgba(230,41,122,0.4);
    animation: todayGlow 2s ease-in-out infinite;
    position: relative;
  }

  .calendar-day.today::after {
    content: '🎂';
    position: absolute;
    top: -10px;
    right: -4px;
    font-size: 0.7rem;
  }

  @keyframes todayGlow {
    0%, 100% { box-shadow: 0 3px 12px rgba(230,41,122,0.4); }
    50% { box-shadow: 0 3px 20px rgba(230,41,122,0.7); }
  }

  .calendar-day.past {
    color: #d4a0b5;
  }

  /* Details */
  .detail-row {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 0;
    border-bottom: 1px solid rgba(255,179,209,0.25);
  }

  .detail-row:last-child { border-bottom: none; }

  .detail-icon {
    width: 44px;
    height: 44px;
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.1rem;
    flex-shrink: 0;
    background: linear-gradient(135deg, var(--pink-200), var(--pink-300));
    color: var(--pink-700);
    box-shadow: 0 2px 8px rgba(255,150,190,0.3);
  }

  .detail-content { flex: 1; }

  .detail-label {
    font-size: 0.75rem;
    color: #b06080;
    text-transform: uppercase;
    letter-spacing: 1px;
    font-weight: 700;
    margin-bottom: 2px;
  }

  .detail-value {
    font-size: 1.05rem;
    font-weight: 700;
    color: var(--text-dark);
  }

  /* Music Player */
  .music-player {
    text-align: center;
    padding: 8px 0;
  }

  .music-visualizer {
    display: flex;
    justify-content: center;
    align-items: flex-end;
    gap: 4px;
    height: 50px;
    margin-bottom: 16px;
  }

  .music-bar {
    width: 5px;
    border-radius: 4px;
    background: linear-gradient(to top, var(--pink-400), var(--gold));
    transition: height 0.15s ease;
    height: 8px;
  }

  .music-bar.active {
    animation: barDance 0.6s ease-in-out infinite alternate;
  }

  @keyframes barDance {
    from { height: var(--min-h, 8px); }
    to { height: var(--max-h, 40px); }
  }

  .play-btn {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    border: none;
    background: linear-gradient(135deg, var(--pink-500), var(--pink-700));
    color: white;
    font-size: 1.5rem;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(230,41,122,0.4);
    transition: all 0.3s;
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }

  .play-btn:hover {
    transform: scale(1.08);
    box-shadow: 0 6px 28px rgba(230,41,122,0.5);
  }

  .play-btn:active { transform: scale(0.96); }

  .music-label {
    margin-top: 12px;
    font-size: 0.85rem;
    color: #b06080;
    font-weight: 600;
  }

  .dombra-icon {
    font-size: 2rem;
    margin-bottom: 8px;
    display: block;
  }

  /* Footer */
  .footer {
    text-align: center;
    padding: 30px 20px;
    animation: fadeSlideUp 1s ease-out 0.8s backwards;
  }

  .footer-text {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--pink-700);
    line-height: 1.4;
  }

  .footer-flowers {
    font-size: 1.8rem;
    margin-top: 10px;
    letter-spacing: 4px;
  }

  .divider {
    width: 60px;
    height: 3px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin: 20px auto;
    border-radius: 2px;
  }

  /* Sparkle decorations */
  .sparkle {
    position: absolute;
    width: 6px;
    height: 6px;
    background: var(--gold-light);
    border-radius: 50%;
    animation: sparkle 2s ease-in-out infinite;
    pointer-events: none;
  }

  @keyframes sparkle {
    0%, 100% { opacity: 0; transform: scale(0); }
    50% { opacity: 1; transform: scale(1); }
  }

  /* Responsive */
  @media (max-width: 400px) {
    .hero h1 { font-size: 2rem; }
    .container { padding: 16px 10px 30px; }
    .card { padding: 20px 16px; }
    .calendar-day { font-size: 0.75rem; padding: 6px 1px; }
  }
</style>
</head>
<body>

<div class="petals-container" id="petals"></div>

<div class="container">
  <section class="hero">
    <div class="flower-ornament">🌸✨🌸</div>
    <h1>Мама, туған<br>күніңізбен!</h1>
    <span class="heart-icon">💓</span>
    <p class="invitation-text">
      Сізді туған күніңізге орай<br>кешкі асқа шақырамыз 💐
    </p>
    <div class="divider"></div>
  </section>

  <div class="card" style="animation-delay:0.2s">
    <div class="card-title">
      <i class="fas fa-calendar-star"></i>
      📅 Наурыз 2026
    </div>
    <div class="calendar">
      <div class="calendar-header">НАУРЫЗ 2026</div>
      <div class="calendar-weekdays">
        <span>Дс</span><span>Сс</span><span>Ср</span><span>Бс</span><span>Жм</span><span>Сн</span><span>Жс</span>
      </div>
      <div class="calendar-days" id="calendarDays"></div>
    </div>
  </div>

  <div class="card" style="animation-delay:0.4s">
    <div class="card-title">
      <i class="fas fa-info-circle"></i>
      ✨ Мәліметтер
    </div>
    <div class="detail-row">
      <div class="detail-icon"><i class="fas fa-calendar-day"></i></div>
      <div class="detail-content">
        <div class="detail-label">Күні</div>
        <div class="detail-value">10 наурыз, 2026 жыл</div>
      </div>
    </div>
    <div class="detail-row">
      <div class="detail-icon"><i class="fas fa-clock"></i></div>
      <div class="detail-content">
        <div class="detail-label">Уақыты</div>
        <div class="detail-value">21:00</div>
      </div>
    </div>
    <div class="detail-row">
      <div class="detail-icon"><i class="fas fa-map-marker-alt"></i></div>
      <div class="detail-content">
        <div class="detail-label">Өтілетін орны</div>
        <div class="detail-value">Lugo</div>
      </div>
    </div>
  </div>

  <div class="card" style="animation-delay:0.6s">
    <div class="card-title">
      <i class="fas fa-music"></i>
      🎵 Домбыра әуені
    </div>
    <div class="music-player">
      <span class="dombra-icon">🎸</span>
      <div class="music-visualizer" id="visualizer"></div>
      <button class="play-btn" id="playBtn" aria-label="Play music">
        <i class="fas fa-play" id="playIcon"></i>
      </button>
      <div class="music-label" id="musicLabel">Әуенді тыңдау үшін басыңыз</div>
    </div>
  </div>

  <section class="footer">
    <div class="footer-text">
      Сіздің келуіңізге<br>қуаныштымыз! 🥰
    </div>
    <div class="footer-flowers">🌷🌹🌸🌺🌷</div>
  </section>
</div>

<script>
(function() {
  // === Falling Petals ===
  const petalsContainer = document.getElementById('petals');
  function createPetal() {
    const petal = document.createElement('div');
    petal.className = 'petal';
    const size = 10 + Math.random() * 16;
    petal.style.width = size + 'px';
    petal.style.height = size + 'px';
    petal.style.left = Math.random() * 100 + '%';
    petal.style.animationDuration = (6 + Math.random() * 8) + 's';
    petal.style.animationDelay = Math.random() * 2 + 's';
    const hue = 330 + Math.random() * 30;
    const lightness = 80 + Math.random() * 15;
    petal.style.background = 'radial-gradient(ellipse at 30% 30%, hsl(' + hue + ',100%,' + lightness + '%), hsl(' + hue + ',80%,' + (lightness - 15) + '%))';
    petalsContainer.appendChild(petal);
    setTimeout(function() { if (petal.parentNode) petal.remove(); }, 16000);
  }
  for (let i = 0; i < 8; i++) setTimeout(createPetal, i * 400);
  setInterval(createPetal, 1800);

  // === Calendar (March 2026) ===
  const calDays = document.getElementById('calendarDays');
  // March 2026: starts on Sunday (day 0)
  // In our grid: Mon=0..Sun=6, so Sunday = 6
  const firstDayIndex = 6; // Sunday -> index 6 in Mon-start grid
  const daysInMonth = 31;

  for (let i = 0; i < firstDayIndex; i++) {
    const empty = document.createElement('div');
    empty.className = 'calendar-day empty';
    calDays.appendChild(empty);
  }
  for (let d = 1; d <= daysInMonth; d++) {
    const dayEl = document.createElement('div');
    dayEl.className = 'calendar-day';
    dayEl.textContent = d;
    if (d === 10) dayEl.classList.add('today');
    if (d < 10) dayEl.classList.add('past');
    calDays.appendChild(dayEl);
  }

  // === Music Visualizer Bars ===
  const visualizer = document.getElementById('visualizer');
  const barCount = 20;
  const bars = [];
  for (let i = 0; i < barCount; i++) {
    const bar = document.createElement('div');
    bar.className = 'music-bar';
    bar.style.setProperty('--min-h', (5 + Math.random() * 6) + 'px');
    bar.style.setProperty('--max-h', (20 + Math.random() * 28) + 'px');
    bar.style.animationDelay = (Math.random() * 0.8) + 's';
    visualizer.appendChild(bar);
    bars.push(bar);
  }

  // === Dombra Sound Synthesis ===
  let audioCtx = null;
  let isPlaying = false;
  let melodyInterval = null;
  let currentGain = null;

  // Kazakh pentatonic scale frequencies (D minor pentatonic, common for dombra)
  const scale = [293.66, 329.63, 349.23, 392.00, 440.00, 493.88, 523.25, 587.33, 659.25];
  // Simple melody pattern indices
  const melodyPattern = [
    0, 2, 4, 3, 2, 0, 2, 4, 5, 4, 3, 2, 0, 2, 4, 6,
    5, 4, 3, 2, 0, 2, 3, 4, 2, 0, 3, 2, 0, 2, 4, 5,
    7, 6, 5, 4, 3, 2, 4, 3, 2, 0, 2, 4, 3, 2, 0, 2
  ];

  function pluckString(ctx, freq, time, duration, gainNode) {
    const osc1 = ctx.createOscillator();
    const osc2 = ctx.createOscillator();
    const oscGain = ctx.createGain();
    const filter = ctx.createBiquadFilter();

    osc1.type = 'triangle';
    osc1.frequency.setValueAtTime(freq, time);

    osc2.type = 'sawtooth';
    osc2.frequency.setValueAtTime(freq * 1.002, time);

    filter.type = 'lowpass';
    filter.frequency.setValueAtTime(3000, time);
    filter.frequency.exponentialRampToValueAtTime(800, time + duration * 0.7);
    filter.Q.setValueAtTime(2, time);

    oscGain.gain.setValueAtTime(0.15, time);
    oscGain.gain.exponentialRampToValueAtTime(0.001, time + duration);

    osc1.connect(filter);
    osc2.connect(filter);
    filter.connect(oscGain);
    oscGain.connect(gainNode);

    osc1.start(time);
    osc2.start(time);
    osc1.stop(time + duration);
    osc2.stop(time + duration);
  }

  function playMelody() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (audioCtx.state === 'suspended') {
      audioCtx.resume();
    }

    currentGain = audioCtx.createGain();
    currentGain.gain.setValueAtTime(0.8, audioCtx.currentTime);
    currentGain.connect(audioCtx.destination);

    let noteIndex = 0;
    const noteDuration = 0.35;
    const noteGap = 0.38;
    let startTime = audioCtx.currentTime + 0.05;

    function scheduleChunk() {
      const chunkSize = 8;
      for (let i = 0; i < chunkSize && noteIndex < melodyPattern.length; i++) {
        const freq = scale[melodyPattern[noteIndex]];
        pluckString(audioCtx, freq, startTime, noteDuration, currentGain);
        // Occasional double pluck for dombra effect
        if (noteIndex % 4 === 0) {
          pluckString(audioCtx, freq * 0.5, startTime + 0.02, noteDuration * 0.8, currentGain);
        }
        startTime += noteGap;
        noteIndex++;
      }

      if (noteIndex >= melodyPattern.length) {
        noteIndex = 0; // Loop
      }
    }

    scheduleChunk();
    melodyInterval = setInterval(scheduleChunk, noteGap * 8 * 1000);
  }

  function stopMelody() {
    if (melodyInterval) {
      clearInterval(melodyInterval);
      melodyInterval = null;
    }
    if (currentGain) {
      const now = audioCtx.currentTime;
      currentGain.gain.setValueAtTime(currentGain.gain.value, now);
      currentGain.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
    }
  }

  const playBtn = document.getElementById('playBtn');
  const playIcon = document.getElementById('playIcon');
  const musicLabel = document.getElementById('musicLabel');

  playBtn.addEventListener('click', function() {
    if (!isPlaying) {
      playMelody();
      isPlaying = true;
      playIcon.className = 'fas fa-pause';
      musicLabel.textContent = '🎶 Домбыра ойнап тұр...';
      bars.forEach(function(b) { b.classList.add('active'); });
    } else {
      stopMelody();
      isPlaying = false;
      playIcon.className = 'fas fa-play';
      musicLabel.textContent = 'Әуенді тыңдау үшін басыңыз';
      bars.forEach(function(b) { b.classList.remove('active'); });
    }
  });
})();
</script>
</body>
</html>
